apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          # Readiness probe: Verify the Pod is ready to receive traffic
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheckPath }}
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          # Liveness probe: Verify the Pod is still running; restarts on failure
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheckPath }}
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          # Resource limits
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
