# ============================================================
# values.yaml - Key configuration variables for the Helm Chart
# ============================================================

# --- Docker Image Settings ---
image:
  repository: cching616/custom-nginx
  tag: v2
  pullPolicy: IfNotPresent

# --- Replica Count ---
# Controls how many Pods to deploy; recommended 2+ for high availability in production
replicaCount: 2

# --- Service Settings ---
# type: LoadBalancer automatically creates a cloud load balancer for external access
# port: The service port exposed externally
service:
  type: LoadBalancer
  port: 80

# --- Resource Limits ---
# requests: Minimum guaranteed resources when a Pod starts
# limits: Maximum resources a Pod can use; exceeding will be throttled or terminated
resources:
  requests:
    cpu: "1m"
    memory: "10Mi"
  limits:
    cpu: "100m"
    memory: "128Mi"

# --- Health Check Path ---
# Checks if /sre.txt responds successfully
healthCheckPath: /sre.txt
